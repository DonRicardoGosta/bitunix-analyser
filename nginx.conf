# Reverse proxy: serves the static SPA and forwards REST calls to Bitunix /
# Binance so the browser never hits a CORS wall, plus the Challenge engine
# backend under /api (HTTP + WebSocket).

# WebSocket upgrade helper for the /api proxy.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for static assets.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ---- Challenge engine backend (REST + WebSocket) ----
    # Path is forwarded verbatim (no prefix stripping); backend routes live
    # under /api. The variable upstream + Docker embedded DNS resolver lets
    # nginx start even when the backend is briefly unavailable. Long timeouts
    # keep the event/state WebSocket alive.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $challenge_backend challenge-backend;
        proxy_pass http://$challenge_backend:8090$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 15s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Bitunix internal web API proxy (trigger / stop-limit orders) ----
    # Authenticated by the user's web session token (passed through from the
    # client as `token` / `userid` / `one-id` headers), not the API key. The
    # static web headers below mirror what the bitunix.com UI sends.
    location /bitunix-web/ {
        proxy_pass https://api.bitunix.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.bitunix.com;
        proxy_set_header Origin "https://www.bitunix.com";
        proxy_set_header Referer "https://www.bitunix.com/";
        proxy_set_header client-type "pc";
        proxy_set_header clienttype "pc";
        proxy_set_header exchange-client "pc";
        proxy_set_header platform-cu "pc";
        proxy_set_header build-cu "200000011";
        proxy_set_header language "en_US";
        proxy_set_header exchange-language "en_US";
        proxy_set_header accept-language "en_US";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # ---- Bitunix REST proxy (account, history, candles, funding) ----
    location /bitunix/ {
        proxy_pass https://fapi.bitunix.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host fapi.bitunix.com;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # ---- Binance public-data proxy (depth, OI, long/short, taker, klines) ----
    location /binance/ {
        proxy_pass https://fapi.binance.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host fapi.binance.com;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # ---- SPA static hosting with client-side routing fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
