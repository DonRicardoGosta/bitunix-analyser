# Single-container reverse proxy: serves the static SPA and forwards REST calls
# to Bitunix / Binance so the browser never hits a CORS wall. No app logic, no
# database — just static hosting plus two pass-through proxies.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for static assets.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ---- Bitunix REST proxy (account, history, candles, funding) ----
    location /bitunix/ {
        proxy_pass https://fapi.bitunix.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host fapi.bitunix.com;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # ---- Binance public-data proxy (depth, OI, long/short, taker, klines) ----
    location /binance/ {
        proxy_pass https://fapi.binance.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host fapi.binance.com;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # ---- SPA static hosting with client-side routing fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
